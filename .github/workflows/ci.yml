name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q

  security:
    # Software-composition analysis (SCA) gate — fails the build on a known
    # CVE in the pinned dependency set. Anticipates a corporate SCA review.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Audit dependencies for known vulnerabilities (pip-audit)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt -r requirements-dev.txt --progress-spinner off

      - name: Scan for committed secrets (detect-secrets)
        run: |
          pip install detect-secrets
          # Fail if any secret is detected in tracked source (venv/cache excluded).
          test "$(detect-secrets scan --exclude-files '\.venv/|cache/|/\.git/' \
            | python -c 'import sys,json; print(len(json.load(sys.stdin)["results"]))')" = "0"
